{% extends "base.html" %}
{% block title %}Inscription{% endblock %}

{% block content %}

<section class="auth-page">

    <div class="auth-card">

        <h1>Créer un compte</h1>
        <p class="auth-subtitle">Inscrivez-vous pour réserver vos événements et accéder à votre profil.</p>

        <form method="POST" class="auth-form">

            <div class="form-row">
                <div class="form-group">
                    <label>Prénom *</label>
                    <input type="text" name="prenom" placeholder="Jean" required>
                </div>

                <div class="form-group">
                    <label>Nom *</label>
                    <input type="text" name="nom" placeholder="Dupont" required>
                </div>
            </div>

            <div class="form-group">
                <label>Téléphone *</label>
                <input type="text" name="telephone" placeholder="06 12 34 56 78" required>
            </div>

            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" placeholder="jean.dupont@email.com" required>
            </div>

            <div class="form-group">
                <label>Mot de passe *</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn-auth">Créer mon compte</button>

        </form>

        <p class="auth-link">
            Déjà un compte ? <a href="{{ url_for('login') }}">Se connecter</a>
        </p>

    </div>

</section>

{% endblock %}
